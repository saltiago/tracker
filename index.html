<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>lifter</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="log-page">

<div id="app">

  <!-- MENU SHEET -->
  <div class="menu-scrim" id="menu-scrim" onclick="closeMenu()"></div>
  <div id="menu-sheet">
    <div class="menu-sheet-title">lifter</div>
    <a href="index.html" class="menu-item active">log</a>
    <a href="stats.html" class="menu-item">stats</a>
    <a href="editor.html" class="menu-item">program</a>
    <a href="stretches.html" class="menu-item">mobility</a>
    <div class="menu-volume">
      <div class="menu-volume-label">beep volume</div>
      <input type="range" id="beep-volume" class="vol-slider" min="0" max="1" step="0.05" value="0.6"
             oninput="setBeepVolume(this.value)">
    </div>
  </div>

  <!-- START / WARMUP POPUP -->
  <div id="start-popup" class="popup-overlay hidden">
    <div class="popup">
      <div class="popup-label">warmup?</div>
      <button class="popup-btn-primary" onclick="startSession(true)">yes — start with warmup</button>
      <button class="popup-btn-danger" onclick="startSession(false)">no — go to round 1</button>
    </div>
  </div>

  <!-- END WORKOUT POPUP -->
  <div id="end-popup" class="popup-overlay hidden">
    <div class="popup">
      <div class="popup-label">end workout</div>
      <button class="popup-btn-primary" onclick="endSave()">save session</button>
      <button class="popup-btn-danger" onclick="endDiscard()">discard</button>
      <button class="popup-btn-cancel" onclick="endCancel()">cancel</button>
    </div>
  </div>

  <!-- EDIT EXERCISE POPUP -->
  <div id="edit-ex-popup" class="popup-overlay hidden">
    <div class="popup">
      <button class="popup-close" onclick="closeEditExercise()">✕</button>
      <div class="popup-label">edit exercise</div>
      <input id="edit-ex-name" class="popup-input" type="text" placeholder="exercise name" autocomplete="off">
      <div class="popup-type-row" id="edit-ex-types"></div>
      <button class="popup-btn-primary" onclick="saveEditExercise()">save</button>
    </div>
  </div>

  <!-- STOPWATCH OVERLAY -->
  <div id="stopwatch-overlay" class="popup-overlay hidden">
    <div class="popup stopwatch-popup">
      <button class="popup-close" onclick="closeStopwatch()">✕</button>
      <div class="popup-label" id="sw-ex-label"></div>

      <!-- Countdown selector -->
      <div class="sw-countdown-row">
        <span class="sw-countdown-label">countdown</span>
        <select id="sw-countdown-select">
          <option value="0">none</option>
          <option value="5">5s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
        </select>
      </div>

      <!-- Big timer display -->
      <div id="sw-display" class="sw-display">0.0</div>
      <div id="sw-phase" class="sw-phase"></div>

      <!-- Controls: tap to start/stop, long press to reset -->
      <div class="sw-controls">
        <button id="sw-start-stop" class="sw-btn-primary sw-btn-big"
                onclick="swToggle()"
                onpointerdown="swLongPressStart()"
                onpointerup="swLongPressCancel()"
                onpointerleave="swLongPressCancel()">start</button>
      </div>
      <div id="sw-long-press-hint" class="sw-long-press-hint">hold to reset</div>

      <!-- Save buttons -->
      <div class="sw-save-row" id="sw-save-row">
        <!-- Populated by JS based on bilateral setting -->
      </div>
    </div>
  </div>

  <!-- WARMUP SKIP POPUP -->
  <div id="warmup-popup" class="popup-overlay hidden">
    <div class="popup">
      <button class="popup-close" onclick="closeWarmupPopup()">✕</button>
      <div class="popup-label">warmup</div>
      <button class="popup-btn-primary" onclick="skipWarmup()">skip warmup</button>
    </div>
  </div>

  <!-- END WORKOUT BUTTON -->
  <button id="end-btn" class="hidden" onclick="endWorkout()">end</button>

  <!-- SCREENS -->

  <!-- START SCREEN -->
  <div id="screen-start" class="screen">
    <div class="start-inner">
      <div class="start-label">ready</div>
      <button class="big-btn" onclick="openStartPopup()">start</button>
    </div>
  </div>

  <!-- EXERCISE INPUT SCREEN -->
  <div id="screen-exercise" class="screen hidden">
    <div class="ex-meta">
      <span id="ex-name" onclick="openEditExercise()"></span>
      <span id="ex-set-label" onclick="onRoundLabelTap()"></span>
    </div>
    <div id="ex-last" class="ex-last"></div>

    <!-- BW modifier -->
    <div id="field-modifier" class="field-block hidden">
      <label>mode</label>
      <select id="input-modifier" onchange="onModifierChange()">
        <option value="bw">BW</option>
        <option value="assisted">assisted</option>
        <option value="weighted">weighted</option>
      </select>
    </div>

    <!-- Band dropdowns -->
    <div id="field-band1" class="field-block hidden">
      <label>band 1</label>
      <select id="input-band1">
        <option value="">—</option>
        <option value="orange">orange</option>
        <option value="purple">purple</option>
        <option value="white">white</option>
        <option value="light grey">light grey</option>
        <option value="dark grey">dark grey</option>
        <option value="black">black</option>
      </select>
    </div>
    <div id="field-band2" class="field-block hidden">
      <label>band 2</label>
      <select id="input-band2">
        <option value="">—</option>
        <option value="orange">orange</option>
        <option value="purple">purple</option>
        <option value="white">white</option>
        <option value="light grey">light grey</option>
        <option value="dark grey">dark grey</option>
        <option value="black">black</option>
      </select>
    </div>

    <!-- Reps -->
    <div id="field-reps" class="field-block hidden">
      <label>reps</label>
      <input id="input-reps" type="number" inputmode="numeric" pattern="[0-9]*"
             autocomplete="off" placeholder="—">
    </div>

    <!-- Weight -->
    <div id="field-weight" class="field-block hidden">
      <label>lbs</label>
      <input id="input-weight" type="number" inputmode="decimal" pattern="[0-9]*"
             autocomplete="off" placeholder="—">
    </div>

    <!-- Seconds -->
    <div id="field-seconds" class="field-block hidden">
      <div class="seconds-row">
        <div>
          <label>seconds</label>
          <input id="input-seconds" type="number" inputmode="numeric" pattern="[0-9]*"
                 autocomplete="off" placeholder="—">
        </div>
        <button class="stopwatch-open-btn" onclick="openStopwatch()">timer</button>
      </div>
    </div>

    <div class="ex-actions">
      <button id="btn-back" onclick="goBack()">←</button>
      <button id="btn-same" onclick="fillSame()">same</button>
      <button id="btn-skip" onclick="skipExercise()">skip</button>
      <button id="btn-next" onclick="manualAdvance()">→</button>
    </div>
  </div>

  <!-- CHECK EXERCISE SCREEN -->
  <div id="screen-check" class="screen hidden">
    <div class="ex-meta">
      <span id="check-name" onclick="openEditExercise()"></span>
      <span id="check-set-label" onclick="onRoundLabelTap()"></span>
    </div>
    <div class="check-area" onclick="completeCheck()">
      <div class="check-tap">tap</div>
    </div>
    <div class="ex-actions">
      <button onclick="goBack()">←</button>
      <button onclick="skipExercise()">skip</button>
      <button onclick="manualAdvance()">→</button>
    </div>
  </div>

  <!-- END OF ROUND SCREEN -->
  <div id="screen-round-end" class="screen hidden">
    <div class="round-end-inner">
      <div id="round-end-label" class="round-label"></div>
      <button class="big-btn" onclick="nextRound()">+ another round</button>
      <button class="done-btn" onclick="endWorkout()">done</button>
      <button class="back-link" onclick="goBack()">← back</button>
    </div>
  </div>

  <!-- SESSION DONE SCREEN -->
  <div id="screen-done" class="screen hidden">
    <div class="start-inner">
      <div id="done-summary" class="done-summary"></div>
      <button class="big-btn" onclick="resetToStart()">finish</button>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="log.js"></script>
</body>
</html>
